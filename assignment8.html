<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assignment 8 - Contact / Signup Mock</title>
</head>
<body style="font-family: Arial, sans-serif; padding:20px;">
  <h1 style="text-align:center;">Create New Account</h1>
  <form style="max-width:600px;margin:auto;">
    <label>First Name</label><br><input type="text" style="width:100%;padding:8px;"><br><br>
    <label>Last Name</label><br><input type="text" style="width:100%;padding:8px;"><br><br>
    <label>Gender</label><br>
    <input type="radio" name="g" value="m"> Male
    <input type="radio" name="g" value="f"> Female<br><br>
    <label>Country</label><br><input type="text" style="width:100%;padding:8px;"><br><br>
    <label>Phone No</label><br><input type="tel" style="width:100%;padding:8px;"><br><br>
    <label>Email</label><br><input type="email" style="width:100%;padding:8px;"><br><br>
    <label>Password</label><br><input type="password" style="width:100%;padding:8px;"><br><br>
    <div style="text-align:center;"><input type="submit" value="Submit" style="padding:8px 18px;"></div>
  </form>
</body>
</html>
