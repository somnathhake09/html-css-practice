<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assignment 16 - Job Application Form</title>
</head>
<body style="font-family: Arial, sans-serif; padding:20px;">
  <h1 style="text-align:center;">JOB APPLICATION FORM</h1>
  <form>
    <fieldset style="width:60%; margin:auto;">
      <legend><b>Section One - Personal Details</b></legend>
      <label>Name:</label> <input type="text" name="name" style="width:100%;padding:6px;"><br><br>
      <label>Age:</label> <input type="number" name="age" style="width:100%;padding:6px;"><br><br>
      <label>Gender:</label>
      <input type="radio" name="gender" value="male"> Male
      <input type="radio" name="gender" value="female"> Female<br><br>
      <label>High School:</label> <input type="text" name="highschool" style="width:100%;padding:6px;"><br><br>
      <label>Qualifications:</label> <input type="text" name="qual" style="width:100%;padding:6px;"><br><br>
    </fieldset>
    <br>
    <fieldset style="width:60%; margin:auto;">
      <legend><b>Section Two - Work Details</b></legend>
      <label>Previous Employment:</label> <input type="text" name="prevemp" style="width:100%;padding:6px;"><br><br>
      <label>References:</label> <input type="text" name="ref" style="width:100%;padding:6px;"><br><br>
      <label>Qualification Details:</label> <input type="text" name="qual2" style="width:100%;padding:6px;"><br><br>
    </fieldset>
    <br>
    <div style="text-align:center;"><input type="submit" value="Submit" style="padding:8px 14px;"></div>
  </form>
</body>
</html>
